name: CI Pipeline - Custom

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login no Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mobead-app:latest ./MobEAD

      - name: Push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mobead-app:latest